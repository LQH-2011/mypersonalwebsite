// ═══════════════════════════════════════════════════════════════════════════
//  Language detection
// ═══════════════════════════════════════════════════════════════════════════
function detectLang() {
  const nav = (navigator.language || "zh-CN").toLowerCase();
  if (nav.startsWith("zh-tw") || nav.startsWith("zh-hk")) return "zh-TW";
  if (nav.startsWith("zh")) return "zh-CN";
  if (nav.startsWith("es")) return "es";
  if (nav.startsWith("de")) return "de";
  return "en";
}

let lang = detectLang();

function applyLang(code) {
  lang = code;
  const t = I18N[code] || I18N["en"];

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    if (t[key]) el.textContent = t[key];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (t[key]) el.placeholder = t[key];
  });

  document.querySelectorAll(".lang-switch button").forEach(b => {
    b.classList.toggle("active", b.dataset.lang === code);
  });

  document.documentElement.lang = code;
}

document.querySelectorAll(".lang-switch button").forEach(btn => {
  btn.addEventListener("click", () => applyLang(btn.dataset.lang));
});

applyLang(lang);

// ═══════════════════════════════════════════════════════════════════════════
//  SHA-256
// ═══════════════════════════════════════════════════════════════════════════
async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}

//  API
// ═══════════════════════════════════════════════════════════════════════════
async function apiGet(path, params = {}) {
  const qs = new URLSearchParams(params).toString();
  const r = await fetch(`${SUPABASE_URL}/${path}?${qs}`, { headers: HEADERS });
  if (!r.ok) throw new Error(`GET ${path}: ${r.status}`);
  return r.json();
}

async function apiPatchCoins(uid, newVal) {
  const r = await fetch(`${SUPABASE_URL}/users?id=eq.${uid}`, {
    method: "PATCH",
    headers: { ...HEADERS, "Prefer": "return=minimal" },
    body: JSON.stringify({ coins: Math.max(0, newVal) }),
  });
  return r.ok;
}

// ═══════════════════════════════════════════════════════════════════════════
//  Auto-step
// ═══════════════════════════════════════════════════════════════════════════
function computeStep(needed, manualStep) {
  if (advancedOpen && manualStep && manualStep < 500) return manualStep;
  if (needed <= 500) return needed;
  return Math.min(manualStep || 500, 500);
}

    const uid  = user.id;
    const hash = await sha256(password);

    if (user.pass !== hash) { log(t.log_bad_pass, "err"); return setRunning(false); }

    let coins = user.coins || 0;
    const initialLevel = getLevel(coins);
    log(t.log_login_ok(uid, coins, initialLevel), "ok");

    if (coins === target) {
      log(t.log_already_met(coins), "ok");
      return setRunning(false);
    }

    const goingUp = coins < target;
    const needed  = Math.abs(target - coins);
    const STEP    = computeStep(needed, manualStep);
    const delta   = goingUp ? STEP : -STEP;
    const steps   = Math.ceil(needed / STEP);

    if (goingUp) log(t.log_going_up(target, steps, STEP), "dim");
    else         log(t.log_going_down(target, steps, STEP), "dim");

    let ok = 0, fail = 0;
    const t0 = performance.now();

    for (let i = 0; i < steps; i++) {
      if (abort) { log(t.log_aborted, "warn"); break; }

      if (await apiPatchCoins(uid, coins + delta)) {
        coins += delta;
        ok++;
      } else {
        fail++;
        try {
          const u2 = await apiGet("users", { select: "coins", id: `eq.${uid}` });
          if (u2.length) coins = u2[0].coins;
        } catch (_) {}
      }

      if ((i + 1) % 10 === 0 || i === steps - 1) {
        const elapsed = (performance.now() - t0) / 1000;
        const rps = (i + 1) / (elapsed || 0.001);
        updateProgress(i + 1, steps, coins, rps, elapsed);
      }

      await new Promise(r => setTimeout(r, 15));
    }

    const elapsed = (performance.now() - t0) / 1000;
    const finalLevel = getLevel(coins);
    log(t.log_done(elapsed, ok, fail), "ok");
    log(t.log_final(coins, finalLevel), "ok");
    if (initialLevel !== finalLevel) log(t.log_level_change(initialLevel, finalLevel), "dim");
    log(t.log_refresh, "ok");

  } catch (e) {
    log(t.log_error(e.message), "err");
  }

  setRunning(false);
}

function stop() {
  abort = true;
  log(I18N[lang].log_aborted, "warn");
}
</script>
