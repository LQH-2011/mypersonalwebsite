<body>
<div class="container">
  <h1>Gestión de Administradores</h1>
  <p class="subtitle">Jacky Forum — Activar / Desactivar admin</p>

  <div class="search-box">
    <input id="search" type="text" placeholder="Buscar usuario..." autofocus="">
    <button onclick="searchUsers()">Buscar</button>
    <button onclick="loadAll()" style="font-size:0.75rem;">Todos</button>
  </div>

  <div id="users" class="users-list">
      <div class="user-row" id="row-12">
        <div class="user-info">
          <span class="user-name">Jesús</span>
          <span class="user-id">ID 12</span>
          <div class="role-badges"><span class="badge badge-admin">admin</span></div>
        </div>
        <button class="toggle-btn remove-admin" onclick="toggleAdmin(12, &#39;Jesús&#39;, false)">Quitar admin</button>
      </div></div>

  <div class="toast" id="toast">✅ "Jesús" ahora es admin</div>
</div>

<script>
const BASE = "https://hxlhrrllhvvazyhiuhvb.supabase.co";
const ANON_KEY = "sb_publishable_uM0aEPvk4q_hRI5VzXN3Yg_IQsCdOCY";
const headers = { "apikey": ANON_KEY, "Authorization": `Bearer ${ANON_KEY}`, "Content-Type": "application/json" };

function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast " + type + " show";
  setTimeout(() => el.className = "toast", 2200);
}

function isAdmin(role) {
  if (!role) return false;
  if (Array.isArray(role)) return role.includes("admin");
  if (typeof role === "string") return role === "admin" || role.includes("admin");
  return false;
}

function renderUsers(users) {
  const container = document.getElementById("users");
  if (!users.length) {
    container.innerHTML = '<div class="empty">No se encontraron usuarios</div>';
    return;
  }
  container.innerHTML = users.map(u => {
    const admin = isAdmin(u.role);
    const otherRoles = u.role ? (Array.isArray(u.role) ? u.role.filter(r => r !== "admin") : []) : [];
    const badges = [];
    if (admin) badges.push('<span class="badge badge-admin">admin</span>');
    otherRoles.forEach(r => badges.push(`<span class="badge badge-other">${r}</span>`));
    if (!admin && !otherRoles.length) badges.push('<span class="badge" style="background:#2a2a2a;color:#777;">sin rol</span>');

    return `
      <div class="user-row" id="row-${u.id}">
        <div class="user-info">
          <span class="user-name">${escapeHtml(u.name)}</span>
          <span class="user-id">ID ${u.id}</span>
          <div class="role-badges">${badges.join('')}</div>
        </div>
        ${admin
          ? `<button class="toggle-btn remove-admin" onclick="toggleAdmin(${u.id}, '${escapeJs(u.name)}', false)">Quitar admin</button>`
          : `<button class="toggle-btn make-admin" onclick="toggleAdmin(${u.id}, '${escapeJs(u.name)}', true)">Hacer admin</button>`
        }
      </div>`;
  }).join("");
}

function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function escapeJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

async function searchUsers() {
  const q = document.getElementById("search").value.trim();
  if (!q) { loadAll(); return; }
  document.getElementById("users").innerHTML = '<div class="loading">Buscando...</div>';

  try {
    const r = await fetch(`${BASE}/rest/v1/users?select=id,name,role&name=ilike.%25${encodeURIComponent(q)}%25&order=name.asc&limit=30`,
      { headers: { ...headers, "Content-Type": undefined } });
    if (!r.ok) throw new Error(r.status);
    renderUsers(await r.json());
  } catch (e) {
    document.getElementById("users").innerHTML = '<div class="empty">Error al buscar</div>';
    toast("Error al buscar usuarios", "error");
  }
}

async function loadAll() {
  document.getElementById("users").innerHTML = '<div class="loading">Cargando...</div>';
  try {
    const r = await fetch(`${BASE}/rest/v1/users?select=id,name,role&order=id.desc&limit=50`,
      { headers: { ...headers, "Content-Type": undefined } });
    if (!r.ok) throw new Error(r.status);
    renderUsers(await r.json());
  } catch (e) {
    document.getElementById("users").innerHTML = '<div class="empty">Error al cargar</div>';
    toast("Error al cargar usuarios", "error");
  }
}

async function toggleAdmin(id, name, makeAdmin) {
  const newRole = makeAdmin ? ["admin"] : [];
  const btn = document.querySelector(`#row-${id} .toggle-btn`);
  if (btn) btn.disabled = true;

  try {
    const r = await fetch(`${BASE}/rest/v1/users?id=eq.${id}`, {
      method: "PATCH",
      headers: { ...headers, "Prefer": "return=representation" },
      body: JSON.stringify({ role: newRole }),
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    toast(makeAdmin ? `✅ "${name}" ahora es admin` : `🔓 Admin removido de "${name}"`,
          "success");
    // Refrescar la lista
    if (document.getElementById("search").value.trim()) searchUsers();
    else loadAll();
  } catch (e) {
    toast(`❌ Error: no se pudo actualizar`, "error");
    if (btn) btn.disabled = false;
  }
}

// Enter key para buscar
document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") searchUsers();
});

// Cargar al iniciar
loadAll();
</script>
