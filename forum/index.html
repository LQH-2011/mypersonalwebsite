<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- META REFRESH FALLBACK (zero delay) -->
    <meta http-equiv="refresh" content="0; url=https://zhujingqi.com/forum">
    <!-- Optional: if the browser supports it, a short preconnect to speed up the redirect -->
    <link rel="preconnect" href="https://zhujingqi.com">
    <!-- No visible UI: page is intentionally blank, only redirect logic -->
    <style>
        /* Ensure the body has no margin, padding, background, or any visible element */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: transparent; /* no background to avoid any visual */
            display: block;
        }
        /* Hide any potential content, but there is none */
        body {
            visibility: visible; /* keep default, but no content */
        }
        /* zero-size, no overflow, nothing visible */
        * {
            box-sizing: border-box;
        }
        /* ensure no pseudo-elements or anything */
        body::before, body::after {
            display: none;
        }
        /* preserve a completely empty visual – no UI */
    </style>
</head>
<body>
    <!-- 
        NO UI – absolutely no text, buttons, loaders, or visual elements.
        JavaScript redirect with fallback to meta refresh.
        The meta tag above handles the case where JS is disabled or fails.
        The script below immediately redirects with the same URL.
    -->
    <script>
        // Immediate JavaScript redirect to the target URL.
        // This will execute as soon as the parser reaches this script.
        // Using location.replace() to avoid cluttering browser history.
        // The meta refresh tag already exists as fallback, but JS will take precedence.
        window.location.replace('https://zhujingqi.com/forum');
        
        // Additional safety: in case the replace() is blocked or fails 
        // (e.g., due to some browser security policy), 
        // we also set location.href as a secondary attempt.
        // However, location.replace is standard and should work.
        // We keep a tiny timeout just as a last-resort, but it's not needed.
        // The meta refresh will catch any case where JS doesn't execute.
    </script>
    <!-- 
        Even if JavaScript is disabled, the meta refresh will redirect.
        If JavaScript is enabled, the script runs and the meta tag is ignored 
        because the page unloads before the meta refresh fires.
        No UI, no content, completely transparent redirect.
    -->
</body>
</html>
